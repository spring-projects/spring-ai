name: "Run Spring AI Autoconfigure Integration Tests"
description: "Run integration tests for all Spring AI auto-configuration modules"

inputs:
  spring-ai-branch:
    description: "Spring AI branch being tested (used for branch-specific test conditions)"
    required: true
    default: "main"
  maven-properties:
    description: "Additional Maven properties to pass to the build"
    required: false
    default: ""
  spring-boot-version:
    description: "Spring Boot version to test against (leave empty to use the project default)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Check environment
      uses: actions/github-script@v7
      with:
        script: |
          const env = ${{ toJson(env) }}
          const emptyEnvEntries = Object.entries(env).filter(e => e[1].length === 0)
          emptyEnvEntries.length > 0 &&
            core.setFailed('Missing value for environment variable(s): ' + emptyEnvEntries.map(e => e[0]).join(', '));

    - name: Run Spring AI Retry Autoconfigure test
      shell: bash
      run: |
        echo 'Running with maven properties:' ${{ inputs.maven-properties }}
        ./mvnw --batch-mode -ntp --no-snapshot-updates \
          -pl auto-configurations/common/spring-ai-autoconfigure-retry \
          -Pintegration-tests ${{ inputs.maven-properties }} ${{ inputs.spring-boot-version != '' && format('-Dspring-boot.version={0}', inputs.spring-boot-version) || '' }} -Dfailsafe.rerunFailingTestsCount=2 verify

    - name: Run Spring AI Autoconfigure Chat Observation test
      shell: bash
      run: |
        echo 'Running with maven properties:' ${{ inputs.maven-properties }}
        ./mvnw --batch-mode -ntp --no-snapshot-updates \
          -pl auto-configurations/models/chat/observation/spring-ai-autoconfigure-model-chat-observation \
          -Pintegration-tests ${{ inputs.maven-properties }} ${{ inputs.spring-boot-version != '' && format('-Dspring-boot.version={0}', inputs.spring-boot-version) || '' }} -Dfailsafe.rerunFailingTestsCount=2 verify

    - name: Run Spring AI Autoconfigure Embedding Observation test
