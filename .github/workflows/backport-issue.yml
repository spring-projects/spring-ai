name: Backport Bot

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]
  push:
    branches:
      - '[0-9]+.[0-9]+.x'
      - 'main'
jobs:
  backport-issue:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Create Backport Issue
        uses: spring-io/backport-bot@v0.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}